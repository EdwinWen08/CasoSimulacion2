<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrar Calificación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <span class="navbar-brand">Registrar Calificación</span>
        </div>
    </nav>

    <!-- Contenedor Principal -->
    <div class="container">
        <div class="container-main">
            <h2 class="page-title">Agregar Nueva Calificación</h2>
            
            <form id="formularioCalificacion">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="nombre_estudiante" class="form-label">Nombre del Estudiante</label>
                        <input type="text" class="form-control" id="nombre_estudiante" name="nombre_estudiante" required>
                    </div>
                    <div class="col-md-6">
                        <label for="cuatrimestre" class="form-label">Cuatrimestre</label>
                        <input type="number" class="form-control" id="cuatrimestre" name="cuatrimestre" min="1" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="notamatematicas" class="form-label">Nota Matemáticas</label>
                        <input type="number" class="form-control" id="notamatematicas" name="notamatematicas" min="0" max="100" required>
                    </div>
                    <div class="col-md-6">
                        <label for="notaciencias" class="form-label">Nota Ciencias</label>
                        <input type="number" class="form-control" id="notaciencias" name="notaciencias" min="0" max="100" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="notaliteratura" class="form-label">Nota Literatura</label>
                        <input type="number" class="form-control" id="notaliteratura" name="notaliteratura" min="0" max="100" required>
                    </div>
                    <div class="col-md-6">
                        <label for="notacivica" class="form-label">Nota Cívica</label>
                        <input type="number" class="form-control" id="notacivica" name="notacivica" min="0" max="100" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="condicion" class="form-label">Condición</label>
                    <select class="form-select" id="condicion" name="condicion" required>
                        <option value="">Seleccionar...</option>
                        <option value="Aprobado">Aprobado</option>
                        <option value="Ampliación">Ampliación</option>
                        <option value="Reprobado">Reprobado</option>
                    </select>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">Registrar Calificación</button>
                    <a href="index.html" class="btn btn-secondary btn-lg">Volver</a>
                </div>
            </form>

            <div id="mensaje" class="mt-4"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script>
        $(document).ready(function() {
            // Manejar envío del formulario
            $('#formularioCalificacion').submit(function(e) {
                e.preventDefault();
                
                // Obtener datos del formulario
                const datos = {
                    nombre_estudiante: $('#nombre_estudiante').val(),
                    cuatrimestre: Number($('#cuatrimestre').val()),
                    notamatematicas: Number($('#notamatematicas').val()),
                    notaciencias: Number($('#notaciencias').val()),
                    notaliteratura: Number($('#notaliteratura').val()),
                    notacivica: Number($('#notacivica').val()),
                    condicion: $('#condicion').val()
                };
                
                // Enviar POST a la API
                $.ajax({
                    url: 'http://localhost:3000/api/calificaciones',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(datos),
                    success: function(response) {
                        $('#mensaje').html(`
                            <div class="alert alert-success" role="alert">
                                ✅ Calificación registrada correctamente
                            </div>
                        `);
                        
                        // Limpiar formulario
                        $('#formularioCalificacion')[0].reset();
                        
                        // Redirigir a index después de 2 segundos
                        setTimeout(function() {
                            window.location.href = 'index.html';
                        }, 2000);
                    },
                    error: function() {
                    }
                });
            });
        });
    </script>
</body>
</html>
